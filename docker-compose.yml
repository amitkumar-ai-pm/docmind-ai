services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
      POSTGRES_DB: docmind
    ports:
      - '5432:5432'
    volumes:
      - docmind_pg_data:/var/lib/postgresql/data

volumes:
  docmind_pg_data:
