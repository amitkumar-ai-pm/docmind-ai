services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
      POSTGRES_DB: docmind
    ports:
      - '5432:5432'
    volumes:
      - docmind_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docmind -d docmind']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: docmind-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://docmind:docmind@postgres:5432/docmind
      USE_PGVECTOR: 'true'
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_TYPE: local
    volumes:
      - docmind_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  docmind_pg_data:
  docmind_uploads:
